const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function picture(kind, name, alt, w, h, eager){
  // kind: 'hero' | 'card'
  return `<picture>
    <source type="image/webp" srcset="assets/img/${kind}-${name}.webp">
    <img src="assets/img/${kind}-${name}.jpg" alt="${esc(alt)}" width="${w}" height="${h}"
         ${eager ? 'fetchpriority="high"' : 'loading="lazy" decoding="async"'}>
  </picture>`;
}

const BEANS = `
  <span class="bean" style="left:18px;top:22px;width:34px;height:46px;transform:rotate(-24deg);opacity:.92" aria-hidden="true"><svg width="100%" height="100%" viewBox="0 0 40 54"><ellipse cx="20" cy="27" rx="16" ry="25" fill="#4a3627"/><path d="M20 5 C13 18 27 36 20 49" stroke="#8a6a4f" stroke-width="2.4" fill="none" stroke-linecap="round"/></svg></span>
  <span class="bean" style="left:50px;top:64px;width:24px;height:33px;transform:rotate(16deg);opacity:.82" aria-hidden="true"><svg width="100%" height="100%" viewBox="0 0 40 54"><ellipse cx="20" cy="27" rx="16" ry="25" fill="#4a3627"/><path d="M20 5 C13 18 27 36 20 49" stroke="#8a6a4f" stroke-width="2.4" fill="none" stroke-linecap="round"/></svg></span>
  <span class="bean" style="right:20px;top:16px;width:30px;height:41px;transform:rotate(28deg);opacity:.88" aria-hidden="true"><svg width="100%" height="100%" viewBox="0 0 40 54"><ellipse cx="20" cy="27" rx="16" ry="25" fill="#4a3627"/><path d="M20 5 C13 18 27 36 20 49" stroke="#8a6a4f" stroke-width="2.4" fill="none" stroke-linecap="round"/></svg></span>
  <span class="bean" style="right:54px;top:62px;width:21px;height:29px;transform:rotate(-14deg);opacity:.72" aria-hidden="true"><svg width="100%" height="100%" viewBox="0 0 40 54"><ellipse cx="20" cy="27" rx="16" ry="25" fill="#4a3627"/><path d="M20 5 C13 18 27 36 20 49" stroke="#8a6a4f" stroke-width="2.4" fill="none" stroke-linecap="round"/></svg></span>`;

/* ---------- app bar ---------- */
function renderBar(screen){
  const el = document.getElementById('appbar-inner');
  const home = !screen;
  el.innerHTML = `
    ${home ? '' : `<a class="back" href="#home" aria-label="Regresar al inicio">‹</a>`}
    <span class="brand-time">09:22</span>
    <span class="brand-name">Café</span>
    <span class="spacer"></span>
    ${home ? '' : `<span class="title">${esc(SCREENS[screen].title)}</span>`}
  `;
}

/* ---------- screens ---------- */
function homeHTML(){
  const cards = CATEGORIES.map(c => `
    <a class="cat-card" href="#${c.key}">
      <span class="cat-thumb">${picture('card', c.img, c.alt, 120, 104, true)}</span>
      <span class="cat-body">
        <span class="cat-name">${esc(c.name)}</span>
        <span class="cat-sub">${esc(c.sub)}</span>
        <span class="cat-cta">Ver menú →</span>
      </span>
    </a>`).join('');
  return `<div class="screen">
    <div class="home-head">
      <div class="home-ring" aria-hidden="true"></div>
      ${BEANS}
      <h1 class="home-word">menu</h1>
      <div class="home-sub">09:22 Café</div>
      <div class="home-rule" aria-hidden="true"></div>
      <p class="home-lede">Elige una categoría para ver nuestro menú completo.</p>
    </div>
    <nav class="cat-list" aria-label="Categorías del menú">${cards}</nav>
    <div class="pricenote">Precios en pesos · Sujetos a cambio</div>
    <p class="foot">09:22 Café · Gracias por tu visita ☕</p>
  </div>`;
}

function heroHTML(cfg){
  const alt = cfg.kind==='drinks'
    ? `Bebida ${cfg.img==='frias'?'fría':'caliente'} de 09:22 Café`
    : (cfg.img==='sandwiches' ? 'Sandwich artesanal de 09:22 Café' : 'Postre de 09:22 Café');
  return `<div class="hero">
    ${picture('hero', cfg.img, alt, 460, 170, true)}
    <div class="hero-cap">
      <div class="hero-kicker">${esc(cfg.kicker)}</div>
      <div class="hero-word">${esc(cfg.word || cfg.title)}</div>
    </div>
  </div>`;
}

// Parse 'Chico 12oz' -> { name:'Chico', oz:'12 oz' } for the table's column headers.
function sizeCols(sizes){
  return sizes.map(s => {
    const i = s.indexOf(' ');
    const name = i < 0 ? s : s.slice(0, i);
    const oz = i < 0 ? '' : s.slice(i + 1).replace(/(\d+)\s*oz/i, '$1 oz');
    return { name, oz };
  });
}

// Build the price cells for one row: one price per size column (a "–" where a size
// isn't offered), or a single right-aligned cell spanning all columns for size-less prices.
function priceCells(chips, cols){
  if(chips.length === 1 && !chips[0].size){
    return `<td class="mprice wide" colspan="${cols.length}">${esc(chips[0].price)}</td>`;
  }
  const bySize = {};
  chips.forEach(c => { if(c.size) bySize[c.size] = c.price; });
  return cols.map(col => bySize[col.name]
    ? `<td class="mprice">${esc(bySize[col.name])}</td>`
    : `<td class="mprice empty"><span aria-hidden="true">–</span></td>`).join('');
}

function drinksHTML(key, cfg){
  const d = MENU[key];
  const cols = sizeCols(d.sizes);
  const colW = cols.length >= 3 ? 62 : 78;
  const colgroup = `<colgroup><col class="c-item">${
    cols.map(() => `<col class="c-price" style="width:${colW}px">`).join('')}</colgroup>`;
  const thead = `<thead><tr>
      <th scope="col" class="th-item">Bebida</th>
      ${cols.map(c => `<th scope="col" class="th-size"><span class="sz-name">${esc(c.name)}</span>${
        c.oz ? `<span class="sz-oz">${esc(c.oz)}</span>` : ''}</th>`).join('')}
    </tr></thead>`;

  const rows = d.items.map(it => {
    const simple = it.rows.length === 1 && !it.rows[0].note;
    if(simple){
      return `<tr class="mrow">
        <th scope="row" class="td-item"><span class="mname">${esc(it.name)}</span>${
          it.desc ? `<span class="mdesc">${esc(it.desc)}</span>` : ''}</th>
        ${priceCells(it.rows[0].chips, cols)}
      </tr>`;
    }
    const head = `<tr class="mgroup"><th scope="row" class="td-item" colspan="${cols.length + 1}">
        <span class="mname">${esc(it.name)}</span>${
          it.desc ? `<span class="mdesc">${esc(it.desc)}</span>` : ''}</th></tr>`;
    const subs = it.rows.map(r => `<tr class="msub">
        <th scope="row" class="td-sub">${esc(r.note)}</th>
        ${priceCells(r.chips, cols)}
      </tr>`).join('');
    return head + subs;
  }).join('');

  const extras = MENU.extras.map(e => `
    <div class="line"><span>${esc(e.name)}</span><span class="price">${esc(e.price)}</span></div>`).join('');
  const pers = MENU.personaliza.map(p => `<span class="tag">${esc(p)}</span>`).join('');
  const sf = MENU.sugarFree.map(s => `<span class="tag sf">${esc(s)}</span>`).join('');

  return `<div class="screen">
    <h1 class="sr-only">${esc(cfg.title)}</h1>
    ${heroHTML(cfg)}
    <div class="mcard">
      <table class="mtable">
        <caption class="sr-only">Precios de ${esc(cfg.title)} por tamaño</caption>
        ${colgroup}
        ${thead}
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="blocks">
      <section class="block block-teal" aria-labelledby="ex-h">
        <h2 id="ex-h">Extras</h2>
        <div class="kv">${extras}</div>
      </section>
      <section class="block block-brown" aria-labelledby="pe-h">
        <h2 id="pe-h" class="tight">Personaliza tu bebida</h2>
        <div class="tags">${pers}</div>
        <div class="subhead">Sugar Free</div>
        <div class="tags">${sf}</div>
      </section>
    </div>
  </div>`;
}

function sandHTML(cfg){
  const cards = MENU.sandwiches.map(s => `
    <div class="sand-card">
      <div class="sand-head">
        <div class="sand-name">${esc(s.name)}</div>
        <div class="sand-price">${esc(s.price)}</div>
      </div>
      <div class="sand-desc">${esc(s.desc)}</div>
    </div>`).join('');
  const extras = MENU.sandExtras.map(e => `
    <div class="line"><span>${esc(e.name)}</span><span class="price">${esc(e.price)}</span></div>`).join('');
  return `<div class="screen">
    <h1 class="sr-only">${esc(cfg.title)}</h1>
    ${heroHTML(cfg)}
    <div class="sand-list">${cards}</div>
    <div class="pad">
      <section class="block block-teal" aria-labelledby="se-h">
        <h2 id="se-h">Extras</h2>
        <div class="kv">${extras}</div>
      </section>
    </div>
  </div>`;
}

function postHTML(cfg){
  const rows = MENU.postres.map(p => `
    <div class="post-row">
      <div><span class="post-name">${esc(p.name)}</span>${p.sub ? `<span class="post-sub">${esc(p.sub)}</span>` : ''}</div>
      <div class="post-price">${esc(p.price)}</div>
    </div>`).join('');
  const otros = MENU.otros.map(o => `
    <div class="line"><span>${esc(o.name)}</span><span class="price gold">${esc(o.price)}</span></div>`).join('');
  return `<div class="screen">
    <h1 class="sr-only">${esc(cfg.title)}</h1>
    ${heroHTML(cfg)}
    <div class="post-list">${rows}</div>
    <div class="pad">
      <section class="block block-brown" aria-labelledby="ot-h">
        <h2 id="ot-h">Otros</h2>
        <div class="kv">${otros}</div>
      </section>
    </div>
  </div>`;
}

/* ---------- Open Graph: make image/url absolute for the actual served URL ---------- */
(function absolutizeOG(){
  try {
    const img = document.querySelector('meta[property="og:image"]');
    if (img && !/^https?:/i.test(img.content)) img.content = new URL(img.getAttribute('content'), location.href).href;
    const url = document.querySelector('meta[property="og:url"]');
    if (url && !url.content) url.content = location.href.split('#')[0];
  } catch (e) {}
})();

/* ---------- router ---------- */
function currentScreen(){
  const h = location.hash.replace(/^#/, '');
  return SCREENS[h] ? h : '';   // '' or unknown hash === home
}

let navigatedInApp = false;   // becomes true once the user navigates within the app

function render(fromNav){
  const key = currentScreen();
  renderBar(key);
  const main = document.getElementById('screen');
  let html, title;
  if(!key){
    html = homeHTML();
    title = 'Inicio';
    document.title = 'Menú · 09:22 Café';
  } else {
    const cfg = SCREENS[key];
    if(cfg.kind === 'drinks') html = drinksHTML(key, cfg);
    else if(cfg.kind === 'sand') html = sandHTML(cfg);
    else html = postHTML(cfg);
    title = cfg.title;
    document.title = cfg.title + ' · 09:22 Café';
  }
  main.innerHTML = html;
  window.scrollTo(0, 0);
  // On real navigations (not initial load): announce the screen succinctly and move focus to it.
  if(fromNav){
    const status = document.getElementById('route-status');
    if(status) status.textContent = title;
    main.setAttribute('tabindex','-1');
    main.focus({preventScroll:true});
  }
}

// In-app back control: reverse history when we have an in-app entry to return to,
// otherwise go home. href="#home" keeps it working with JS disabled.
document.addEventListener('click', (e) => {
  const back = e.target.closest ? e.target.closest('.back') : null;
  if(!back) return;
  e.preventDefault();
  if(navigatedInApp && history.length > 1) history.back();
  else location.hash = '';
});

window.addEventListener('hashchange', () => { navigatedInApp = true; render(true); });
render(false);
</script>
